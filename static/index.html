<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI情报官</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .prose h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 .5rem; }
    .prose h2 { font-size: 1.25rem; font-weight: 600; margin: .9rem 0 .4rem; }
    .prose h3 { font-size: 1.1rem; font-weight: 600; margin: .8rem 0 .3rem; }
    .prose p  { margin: .4rem 0; line-height: 1.7; }
    .prose ul { list-style: disc; padding-left: 1.4rem; margin: .4rem 0; }
    .prose ol { list-style: decimal; padding-left: 1.4rem; margin: .4rem 0; }
    .prose li { margin: .2rem 0; line-height: 1.6; }
    .prose strong { font-weight: 700; }
    .prose code { background: #f1f5f9; padding: .1rem .3rem; border-radius: 3px; font-size:.85em; }
    .prose blockquote { border-left: 3px solid #94a3b8; padding-left:.8rem; color: #64748b; margin: .5rem 0; }
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen" x-data="app()" x-init="init()">

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 flex-wrap shadow-sm">
  <h1 class="text-xl font-bold text-indigo-700 mr-2">🔍 AI情报官</h1>

  <!-- Fetch Articles -->
  <button @click="fetchArticles()"
    :disabled="loadingArticles"
    class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-50 transition">
    <svg x-show="loadingArticles" class="spinner w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
    </svg>
    <span x-text="loadingArticles ? '抓取中…' : '刷新文章'"></span>
    <span x-show="articleCount > 0 && !loadingArticles" class="bg-white text-indigo-700 text-xs font-bold px-1.5 py-0.5 rounded-full" x-text="articleCount + '篇'"></span>
  </button>

  <!-- Generate Briefing -->
  <button @click="generateBriefing()"
    :disabled="loadingBriefing || articleCount === 0"
    class="flex items-center gap-1.5 px-4 py-1.5 rounded-lg text-sm font-medium bg-emerald-600 text-white hover:bg-emerald-700 disabled:opacity-50 transition">
    <svg x-show="loadingBriefing" class="spinner w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
    </svg>
    <span x-text="loadingBriefing ? '生成中…' : '生成简报'"></span>
  </button>

  <div class="flex-1"></div>

  <!-- Scheduler -->
  <div class="flex items-center gap-2 text-sm">
    <span class="text-gray-500">定时刷新：</span>
    <select x-model.number="schedulerMinutes"
      class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-400">
      <option value="0">关闭</option>
      <option value="15">15 分钟</option>
      <option value="30">30 分钟</option>
      <option value="60">1 小时</option>
      <option value="120">2 小时</option>
      <option value="360">6 小时</option>
    </select>
    <button @click="applyScheduler()"
      class="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium transition text-sm">
      应用
    </button>
    <span x-show="schedulerStatus.enabled && schedulerStatus.next_run"
      class="text-xs text-gray-400" x-text="'下次：' + formatTime(schedulerStatus.next_run)"></span>
  </div>
</header>

<!-- ── Main Layout ─────────────────────────────────────────────────────── -->
<div class="flex h-[calc(100vh-57px)]">

  <!-- Left: Feed Management -->
  <aside class="w-72 bg-white border-r border-gray-200 flex flex-col overflow-hidden">
    <div class="px-4 pt-4 pb-2 border-b border-gray-100">
      <h2 class="font-semibold text-gray-700 mb-3">订阅源管理</h2>

      <!-- URL input -->
      <div class="space-y-2">
        <input x-model="newUrl"
          @input.debounce.600ms="prevalidate()"
          @keydown.enter="newUrl && addFeed()"
          placeholder="输入RSS URL…"
          class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />

        <!-- Validation indicator -->
        <div x-show="validating" class="text-xs text-gray-400 flex items-center gap-1">
          <svg class="spinner w-3 h-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
          验证中…
        </div>
        <div x-show="!validating && validFeed" class="text-xs text-emerald-600 font-medium truncate" x-text="'✓ ' + (validFeed.feed_title || validFeed.url)"></div>
        <div x-show="!validating && validateError" class="text-xs text-red-500" x-text="'✗ ' + validateError"></div>

        <!-- Name input (only after valid) -->
        <template x-if="validFeed">
          <div class="space-y-2">
            <input x-model="newName"
              :placeholder="validFeed.feed_title || '给这个订阅源起个名字'"
              class="w-full border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            <button @click="addFeed()"
              :disabled="addingFeed"
              class="w-full py-1.5 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 transition"
              x-text="addingFeed ? '添加中…' : '确认添加'">
            </button>
          </div>
        </template>
      </div>

      <!-- Add error -->
      <div x-show="addError" class="mt-2 text-xs text-red-500" x-text="addError"></div>
    </div>

    <!-- Feed List -->
    <div class="flex-1 overflow-y-auto px-4 py-3 space-y-1">
      <template x-if="feeds.length === 0">
        <p class="text-sm text-gray-400 text-center py-6">暂无订阅源<br>添加第一个RSS源开始使用</p>
      </template>
      <template x-for="feed in feeds" :key="feed.name">
        <div class="flex items-center gap-2 group px-2 py-1.5 rounded-lg hover:bg-gray-50 transition">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate" x-text="feed.name"></div>
            <div class="text-xs text-gray-400 truncate" x-text="feed.url"></div>
          </div>
          <button @click="deleteFeed(feed.name)"
            class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition text-lg leading-none"
            title="删除">×</button>
        </div>
      </template>
    </div>

    <!-- Status bar -->
    <div x-show="articlesData" class="border-t border-gray-100 px-4 py-2 text-xs text-gray-400">
      <div x-text="'信源数：' + feeds.length + '，文章总计：' + articleCount + '篇'"></div>
      <div x-show="articlesAt" x-text="'抓取时间：' + formatTime(articlesAt)"></div>
    </div>
  </aside>

  <!-- Right: Briefing Panel -->
  <main class="flex-1 overflow-y-auto bg-white">
    <!-- Toolbar -->
    <div x-show="briefing || briefingAt" class="sticky top-0 bg-white border-b border-gray-100 px-6 py-2 flex items-center gap-3 text-sm z-10">
      <span class="text-gray-500 font-medium">情报简报</span>
      <span x-show="briefingAt" class="text-xs text-gray-400" x-text="'生成于 ' + formatTime(briefingAt)"></span>
      <div class="flex-1"></div>
      <button x-show="briefing && !loadingBriefing" @click="copyBriefing()"
        class="text-xs text-gray-400 hover:text-gray-600 transition">复制</button>
    </div>

    <!-- Content -->
    <div class="px-8 py-6 max-w-4xl mx-auto">
      <!-- Loading skeleton -->
      <template x-if="loadingBriefing && !briefing">
        <div class="space-y-3 animate-pulse">
          <div class="h-5 bg-gray-200 rounded w-1/3"></div>
          <div class="h-3 bg-gray-100 rounded w-full"></div>
          <div class="h-3 bg-gray-100 rounded w-5/6"></div>
          <div class="h-3 bg-gray-100 rounded w-4/6"></div>
        </div>
      </template>

      <!-- Briefing content -->
      <template x-if="briefing">
        <div class="prose text-gray-800 text-sm leading-relaxed" x-html="renderMarkdown(briefing)"></div>
      </template>

      <!-- Empty state -->
      <template x-if="!briefing && !loadingBriefing">
        <div class="flex flex-col items-center justify-center py-24 text-gray-400">
          <svg class="w-16 h-16 mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <p class="text-lg font-medium mb-1">暂无情报简报</p>
          <p class="text-sm">先点击「刷新文章」抓取最新内容，<br>再点击「生成简报」让 AI 为你分析。</p>
          <div class="mt-6 flex gap-3">
            <button @click="fetchArticles()" :disabled="loadingArticles"
              class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 disabled:opacity-50 transition"
              x-text="loadingArticles ? '抓取中…' : '刷新文章'">
            </button>
          </div>
        </div>
      </template>
    </div>
  </main>

</div>

<!-- Toast -->
<div x-show="toast" x-cloak x-transition
  class="fixed bottom-6 right-6 bg-gray-800 text-white text-sm px-4 py-2.5 rounded-xl shadow-lg z-50"
  x-text="toast"></div>

<script>
function app() {
  return {
    // State
    feeds: [],
    newUrl: '',
    newName: '',
    validFeed: null,
    validateError: null,
    validating: false,
    addingFeed: false,
    addError: null,

    articlesData: null,
    articleCount: 0,
    articlesAt: null,
    loadingArticles: false,

    briefing: '',
    briefingAt: null,
    loadingBriefing: false,

    schedulerStatus: {},
    schedulerMinutes: 0,

    toast: '',
    _toastTimer: null,
    _statusPollTimer: null,

    // ── Init ──────────────────────────────────────────────────────────────
    async init() {
      await Promise.all([
        this.loadFeeds(),
        this.loadLatestBriefing(),
        this.loadSchedulerStatus(),
      ]);
      // Poll scheduler status every 60s
      this._statusPollTimer = setInterval(() => this.loadSchedulerStatus(), 60000);
    },

    // ── Feeds ─────────────────────────────────────────────────────────────
    async loadFeeds() {
      const res = await fetch('/api/feeds');
      const data = await res.json();
      this.feeds = data.feeds || [];
    },

    async prevalidate() {
      const url = this.newUrl.trim();
      this.validFeed = null;
      this.validateError = null;
      this.newName = '';
      if (!url || !url.startsWith('http')) return;

      this.validating = true;
      try {
        const res = await fetch('/api/feeds/validate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url}),
        });
        const data = await res.json();
        if (data.valid) {
          this.validFeed = data;
          this.newName = data.feed_title || '';
        } else {
          this.validateError = data.error || '无效的RSS地址';
        }
      } catch (e) {
        this.validateError = '网络错误';
      } finally {
        this.validating = false;
      }
    },

    async addFeed() {
      const url = this.newUrl.trim();
      const name = (this.newName || '').trim() || (this.validFeed && this.validFeed.feed_title) || url;
      if (!url || !name) return;

      this.addError = null;
      this.addingFeed = true;
      try {
        const res = await fetch('/api/feeds', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, url}),
        });
        const data = await res.json();
        if (res.ok) {
          this.showToast(`已添加：${name}`);
          this.newUrl = '';
          this.newName = '';
          this.validFeed = null;
          this.validateError = null;
          await this.loadFeeds();
        } else {
          this.addError = data.detail || '添加失败';
        }
      } catch (e) {
        this.addError = '网络错误';
      } finally {
        this.addingFeed = false;
      }
    },

    async deleteFeed(name) {
      if (!confirm(`确认删除「${name}」？`)) return;
      const res = await fetch(`/api/feeds/${encodeURIComponent(name)}`, {method: 'DELETE'});
      if (res.ok) {
        this.showToast(`已删除：${name}`);
        await this.loadFeeds();
      }
    },

    // ── Articles ──────────────────────────────────────────────────────────
    async fetchArticles() {
      this.loadingArticles = true;
      try {
        const res = await fetch('/api/articles');
        const data = await res.json();
        this.articlesData = data;
        let count = 0;
        (data.results || []).forEach(r => { count += (r.articles || []).length; });
        this.articleCount = count;
        this.articlesAt = new Date().toISOString();
        this.showToast(`已抓取 ${count} 篇文章`);
      } catch (e) {
        this.showToast('抓取失败：' + e.message);
      } finally {
        this.loadingArticles = false;
      }
    },

    // ── Briefing ──────────────────────────────────────────────────────────
    async loadLatestBriefing() {
      const res = await fetch('/api/briefing/latest');
      const data = await res.json();
      if (data.briefing) {
        this.briefing = data.briefing;
        this.briefingAt = data.generated_at;
      }
    },

    async generateBriefing() {
      if (this.loadingBriefing) return;
      this.loadingBriefing = true;
      this.briefing = '';

      try {
        const es = new EventSource('/api/briefing/stream');
        let buffer = '';

        es.onmessage = (e) => {
          if (e.data === '[DONE]') {
            es.close();
            this.loadingBriefing = false;
            this.briefingAt = new Date().toISOString();
            this.showToast('简报生成完毕');
            return;
          }
          if (e.data.startsWith('[ERROR]')) {
            const msg = e.data.slice(7).trim();
            es.close();
            this.loadingBriefing = false;
            this.showToast('生成失败：' + msg);
            return;
          }
          // Unescape newlines
          const chunk = e.data.replace(/\\n/g, '\n');
          buffer += chunk;
          this.briefing = buffer;
        };

        es.onerror = () => {
          es.close();
          this.loadingBriefing = false;
          if (!this.briefing) {
            this.showToast('连接中断，请重试');
          }
        };
      } catch (e) {
        this.loadingBriefing = false;
        this.showToast('错误：' + e.message);
      }
    },

    renderMarkdown(text) {
      return marked.parse(text || '');
    },

    copyBriefing() {
      navigator.clipboard.writeText(this.briefing).then(() => {
        this.showToast('已复制到剪贴板');
      });
    },

    // ── Scheduler ─────────────────────────────────────────────────────────
    async loadSchedulerStatus() {
      try {
        const res = await fetch('/api/scheduler/status');
        const data = await res.json();
        this.schedulerStatus = data;
        this.schedulerMinutes = data.interval_minutes || 0;
      } catch (e) {}
    },

    async applyScheduler() {
      const res = await fetch('/api/scheduler/config', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({interval_minutes: this.schedulerMinutes}),
      });
      const data = await res.json();
      this.schedulerStatus = data;
      const msg = this.schedulerMinutes > 0
        ? `定时刷新已设置：每 ${this.schedulerMinutes} 分钟`
        : '定时刷新已关闭';
      this.showToast(msg);
    },

    // ── Helpers ───────────────────────────────────────────────────────────
    formatTime(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('zh-CN', {
          month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit',
        });
      } catch { return iso; }
    },

    showToast(msg) {
      this.toast = msg;
      if (this._toastTimer) clearTimeout(this._toastTimer);
      this._toastTimer = setTimeout(() => { this.toast = ''; }, 3000);
    },
  };
}
</script>
</body>
</html>
